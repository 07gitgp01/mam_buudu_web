<!-- Barre de chargement globale (toutes les requêtes HTTP) -->
<div class="global-loading-bar" *ngIf="loading.isLoading$ | async">
  <div class="global-loading-fill"></div>
</div>

<div class="shell" [class.sidebar-open]="sidebarOpen">
  <div class="mob-backdrop" *ngIf="sidebarOpen" (click)="sidebarOpen=false"></div>
  <app-sidebar [mobileOpen]="sidebarOpen" (mobileClose)="sidebarOpen=false"></app-sidebar>
  <div class="shell-right">
    <app-topbar (menuToggle)="sidebarOpen = !sidebarOpen"></app-topbar>
    <main class="shell-main">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
